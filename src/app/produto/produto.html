@if(produto) {

<div class="produto-detalhe">

    <div class="imagem">

        <img
          [src]="produto.image"
          [alt]="produto.title"
        >

    </div>

    <div class="informacoes">

        <span class="categoria">
            {{ produto.category }}
        </span>

        <h1>{{ produto.title }}</h1>

        <div class="avaliacao">

            ⭐ {{ produto?.rating?.rate }}

            <span>
                ({{ produto?.rating?.count }} avaliações)
            </span>

        </div>

        <h2>
            R$ {{ produto.price }}
        </h2>

        <p class="descricao">
            {{ produto.description }}
        </p>

        <div class="dados">

            <div class="info-box">
                <strong>ID</strong>
                <span>{{ produto.id }}</span>
            </div>

            <div class="info-box">
                <strong>Categoria</strong>
                <span>{{ produto.category }}</span>
            </div>

        </div>

        <div class="acoes">

            <button class="btn-carrinho">
                🛒 Adicionar ao Carrinho
            </button>

            <button
                class="btn-voltar"
                routerLink="/home"
            >
                ← Voltar
            </button>

        </div>

    </div>

</div>

} @else {

<div class="loading">
    Carregando produto...
</div>

}
