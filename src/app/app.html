<div class="pagina">

  <!-- Barra Superior -->
  <header class="topbar">
    
    <!-- Logo (esquerda) -->
    <div class="logo">
      Mercado Big Bom
    </div>

    <!-- Login (direita) -->
    <div class="login">
    @if(usuario){

      <div class="usuario-logado">

        <span>
          Olá,
          {{ usuario.name.firstname }}
        </span>

        <button routerLink="/perfil">
          Minha Conta
        </button>

        <button
          class="sair"
          (click)="sair()">
          Sair
        </button>

      </div>

    } @else {

      <button routerLink="/login">
        Login
      </button>
    }
  </div>

  </header>

  <!-- Conteúdo das páginas -->
  <main class="conteudo">
    <router-outlet></router-outlet>
  </main>

</div>
