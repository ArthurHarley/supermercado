<div class="pagina">

  <header class="topbar">

    <div class="logo">
      Mercado Big Bom
    </div>

    <div class="login">

      @if(usuario){

        <div class="usuario-logado">

          <span>
            Olá,
            {{ usuario.name.firstname }}
          </span>

          <button routerLink="/carrinho">
            🛒 Carrinho
          </button>

          <button routerLink="/perfil">
            Minha Conta
          </button>

          <button
            class="sair"
            (click)="sair()">
            Sair
          </button>

        </div>

      } @else {

        <button routerLink="/login">
          Login
        </button>

      }

    </div>

  </header>

  <main class="conteudo">
    <router-outlet></router-outlet>
  </main>

</div>
